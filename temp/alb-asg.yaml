AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Description: |
  GenAI Streamlit Server Infrastructure - Deploys an Auto Scaling Group of EC2 instances 
  running Streamlit applications behind an Application Load Balancer with HTTPS listeners 
  on multiple ports (8081-8090) for multi-session GenAI workloads.

Parameters:
  # AMI Configuration
  LatestAWSLinuxAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: '/aws/service/cloud9/amis/ubuntu-22.04-x86_64'
    Description: AMI ID for Ubuntu 22.04 LTS (Do not change)
    
  # Domain and Certificate Configuration
  Domain:
    Type: String
    Description: Root domain name for the application
    
  AlbName:
    Type: String
    Default: lbgenai
    Description: Name for the Application Load Balancer
    
  CertId:
    Type: String
    Description: ACM Certificate ID for HTTPS listeners

  TargetGroupName:
    Type: String
    Default: genai
    Description: Name for the Application Load Balancer's target group

  # Instance Configuration
  InstanceType:
    Type: String
    Description: EC2 instance type for the Auto Scaling Group
    Default: t3.xlarge
    AllowedValues:
      - t3.small
      - t3.medium
      - t3.large
      - t3.xlarge
      - t3a.medium
      - t3a.large
    
  # Network Configuration (Missing Resources as Parameters)
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID where resources will be deployed
    
  PrivateSubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Private subnet ID for EC2 instances
    
  PublicSubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: First public subnet ID for the load balancer
    
  PublicSubnetTwoId:
    Type: AWS::EC2::Subnet::Id
    Description: Second public subnet ID for the load balancer (different AZ)

  SourcePrefixListId:
    Type: String
    Description: Source prefix list id for network access control

  CloudFrontALBSecretName:
    Type: String
    Description: Name of the secret containing headers for CloudFront-ALB origin verification

Resources:
  # ================================
  # Auto Scaling Resources
  # ================================
  
  AIPServerGroup:
    Type: "AWS::AutoScaling::AutoScalingGroup"
    Properties:
      AutoScalingGroupName: AIPServerGroup
      VPCZoneIdentifier:
        - !Ref PrivateSubnetId
      MinSize: 1
      MaxSize: 1
      DesiredCapacity: 1
      TargetGroupARNs:
        - !Ref TargetGroup80
        - !Ref TargetGroup8081
        - !Ref TargetGroup8082
        - !Ref TargetGroup8083
        - !Ref TargetGroup8084
        - !Ref TargetGroup8085
        - !Ref TargetGroup8086
        - !Ref TargetGroup8087
        - !Ref TargetGroup8088
        - !Ref TargetGroup8089
        - !Ref TargetGroup8090
      MixedInstancesPolicy:
        LaunchTemplate:
          LaunchTemplateSpecification:
            LaunchTemplateId: !Ref AIPLaunchTemplate
            Version: !GetAtt AIPLaunchTemplate.LatestVersionNumber
          Overrides:   
          - InstanceType: t3.xlarge
          - InstanceType: t3.medium
          - InstanceType: t3a.medium
          - InstanceType: t3.large
          - InstanceType: t3a.large
        InstancesDistribution:
          OnDemandBaseCapacity: 1
          OnDemandPercentageAboveBaseCapacity: 0
          SpotAllocationStrategy: capacity-optimized-prioritized

  AIPLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: AIPLaunchTemplate
      LaunchTemplateData:
        IamInstanceProfile: 
          Arn: !GetAtt InstanceProfile.Arn
        ImageId: !Ref LatestAWSLinuxAmiId
        InstanceType: !Ref InstanceType
        BlockDeviceMappings: 
        - DeviceName: "/dev/sda1"
          Ebs: 
            VolumeType: gp2
            DeleteOnTermination: true
            VolumeSize: 100
        SecurityGroupIds:
          - !Ref InstanceSecurityGroup
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: AIPStreamlitServer
        UserData:
          Fn::Base64:
            !Sub |
              #cloud-config
              package_update: true
              package_upgrade: true

              packages:
              - git
              - apache2

              write_files:
              - content: |
                  @reboot /bin/bash /home/ubuntu/environment/apcr-aip/session1/setup.sh
                  @reboot /bin/bash /home/ubuntu/environment/apcr-aip/session2/setup.sh
                  @reboot /bin/bash /home/ubuntu/environment/apcr-aip/session3/setup.sh
                  @reboot /bin/bash /home/ubuntu/environment/apcr-aip/session4/setup.sh
                  @reboot /bin/bash /home/ubuntu/environment/apcr-aip/session5/setup.sh

                owner: ubuntu:root
                path: /home/ubuntu/environment/mycrontab
                permissions: '0600'

              runcmd:
              - cd /home/ubuntu/environment
              - git clone https://github.com/yiktol/apcr-aip.git
              - cp -Rf /home/ubuntu/environment/apcr-aip/session0/* /var/www/html/
              - systemctl start apache2
              - systemctl enable apache2
              - chown -R ubuntu:root /home/ubuntu/environment
              - crontab mycrontab
              - /bin/bash /home/ubuntu/environment/apcr-aip/run-all-sessions.sh

  # Auto Scaling Policies
  AIPWebServerScaleOutPolicy:
    Type: "AWS::AutoScaling::ScalingPolicy"
    Properties:
      AdjustmentType: ChangeInCapacity
      AutoScalingGroupName: !Ref AIPServerGroup
      Cooldown: 60
      ScalingAdjustment: 1

  AIPWebServerScaleInPolicy:
    Type: "AWS::AutoScaling::ScalingPolicy"
    Properties:
      AdjustmentType: ChangeInCapacity
      AutoScalingGroupName: !Ref AIPServerGroup
      Cooldown: 60
      ScalingAdjustment: -1

  # ================================
  # CloudWatch Alarms
  # ================================

  CPUAlarmHigh:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${TargetGroupName}-scale-out-alarm"
      ActionsEnabled: true
      AlarmDescription: Scale-up if CPU >= 60% for 1 minute
      MetricName: CPUUtilization
      Namespace: AWS/EC2
      Statistic: Average
      Period: 60
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 60
      AlarmActions:
        - !Ref AIPWebServerScaleOutPolicy
      Dimensions:
        - Name: AutoScalingGroupName
          Value: !Ref AIPServerGroup
      ComparisonOperator: GreaterThanThreshold

  CPUAlarmLow:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${TargetGroupName}-scale-in-alarm"
      ActionsEnabled: true
      AlarmDescription: Scale-down if CPU <= 40% for 1 minute
      MetricName: CPUUtilization
      Namespace: AWS/EC2
      Statistic: Average
      Period: 60
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 40
      AlarmActions:
        - !Ref AIPWebServerScaleInPolicy
      Dimensions:
        - Name: AutoScalingGroupName
          Value: !Ref AIPServerGroup
      ComparisonOperator: LessThanThreshold

  # ================================
  # Security Groups
  # ================================

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EC2 instances - allows ALB access to application ports
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - SourceSecurityGroupId: !GetAtt LoadBalancerSecurityGroup.GroupId
          IpProtocol: tcp
          FromPort: 8080
          ToPort: 8090
          Description: Allow ALB access to application ports
        - SourceSecurityGroupId: !GetAtt LoadBalancerSecurityGroup.GroupId
          IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          Description: Allow ALB access to application ports
  LoadBalancerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for ALB - allows public HTTPS access
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - SourcePrefixListId: !Ref SourcePrefixListId
          IpProtocol: tcp
          FromPort: 8080
          ToPort: 8090
          Description: Allow access from S3 prefix list to application ports

  # ================================
  # IAM Resources
  # ================================

  InstanceRole:
    Type: "AWS::IAM::Role"
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - "sts:AssumeRole"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: StreamlitPolicy
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Sid: BedrockPolicy
                Effect: Allow
                Action: bedrock:*
                Resource: "*"
              - Sid: LogPolicy
                Effect: Allow
                Action: 
                 - logs:Describe*
                 - logs:Create*
                 - logs:Put*
                Resource: '*'
              - Sid: DDBPolicy
                Effect: Allow
                Action: 
                 - dynamodb:PutItem
                 - dynamodb:GetItem
                 - dynamodb:UpdateItem
                Resource: '*'
              - Sid: GetSecret
                Effect: Allow
                Action: 
                 - secretsmanager:GetSecretValue
                Resource: '*'
              - Sid: FISExperimentManagement
                Effect: Allow
                Action:
                  - fis:StartExperiment
                  - fis:StopExperiment
                  - fis:GetExperiment
                  - fis:ListExperiments
                  - fis:ListExperimentTemplates
                  - fis:GetExperimentTemplate
                  - fis:ListTagsForResource
                Resource: '*'
              - Sid: ReadOnlyAccess
                Effect: Allow
                Action:
                  - ec2:DescribeInstances
                  - ec2:DescribeVolumes
                  - ec2:DescribeSubnets
                  - ec2:DescribeVpcs
                  - rds:DescribeDBInstances
                  - elasticloadbalancing:DescribeLoadBalancers
                  - eks:DescribeCluster
                  - lambda:ListFunctions
                Resource: '*'
              - Sid: CloudWatchLogsAccess
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                Resource: arn:aws:logs:*:*:log-group:/aws/fis/*
              - Sid: IAMServiceRoleUsage
                Effect: Allow
                Action:
                  - iam:GetRole
                  - iam:PassRole
                Resource: arn:aws:iam::*:role/aws-service-role/fis.amazonaws.com/AWSServiceRoleForFIS*

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: "/"
      Roles:
        - !Ref InstanceRole

  # ================================
  # Load Balancer Resources
  # ================================

  LoadBalancer:
    Type: "AWS::ElasticLoadBalancingV2::LoadBalancer"
    Properties:
      Name: !Ref AlbName
      Scheme: internet-facing
      IpAddressType: dualstack
      LoadBalancerAttributes:
        - Key: idle_timeout.timeout_seconds
          Value: "30"
      Subnets:
        - !Ref PublicSubnetId
        - !Ref PublicSubnetTwoId
      SecurityGroups: 
        - !Ref LoadBalancerSecurityGroup

  LoadBalancerDNSRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneName: !Sub ${Domain}.
      Name: !Sub ${AlbName}.${Domain}
      Type: A
      AliasTarget:
        HostedZoneId: !GetAtt LoadBalancer.CanonicalHostedZoneID
        DNSName: !GetAtt LoadBalancer.DNSName
        EvaluateTargetHealth: true

  # ================================
  # Target Groups (Ports 8081-8090)
  # ================================
  TargetGroup80:
    Type: "AWS::ElasticLoadBalancingV2::TargetGroup"
    Properties:
      Name: !Sub "${TargetGroupName}-tg-80"
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 3
      Port: 80
      Protocol: HTTP
      UnhealthyThresholdCount: 5
      VpcId: !Ref VpcId
      TargetGroupAttributes: 
        - Key: stickiness.enabled
          Value: true
        - Key: stickiness.type
          Value: lb_cookie

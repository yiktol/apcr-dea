Outputs:
  # Load Balancer Outputs
  LoadBalancerDNS:
    Description: DNS name of the Application Load Balancer
    Value: !GetAtt LoadBalancer.DNSName

  LoadBalancerURL:
    Description: URL of the Application Load Balancer
    Value: !Sub "https://${LoadBalancer.DNSName}"

  CustomDomainURL:
    Description: Custom domain URL for the application
    Value: !Sub "https://${AlbName}.${Domain}"

  # Auto Scaling Group Outputs
  AutoScalingGroupName:
    Description: Name of the Auto Scaling Group
    Value: !Ref AIPServerGroup

  LaunchTemplateName:
    Description: Name of the Launch Template
    Value: !Ref AIPLaunchTemplate

  # Security Group Outputs
  InstanceSecurityGroupId:
    Description: Security Group ID for EC2 instances
    Value: !Ref InstanceSecurityGroup

  LoadBalancerSecurityGroupId:
    Description: Security Group ID for the Load Balancer
    Value: !Ref LoadBalancerSecurityGroup

  # Application Endpoints
  StreamlitSession1URL:
    Description: Streamlit Session 1 URL (Port 8081)
    Value: !Sub "https://${AlbName}.${Domain}:8081"

  StreamlitSession2URL:
    Description: Streamlit Session 2 URL (Port 8082)
    Value: !Sub "https://${AlbName}.${Domain}:8082"

  StreamlitSession3URL:
    Description: Streamlit Session 3 URL (Port 8083)
    Value: !Sub "https://${AlbName}.${Domain}:8083"

  StreamlitSession4URL:
    Description: Streamlit Session 4 URL (Port 8084)
    Value: !Sub "https://${AlbName}.${Domain}:8084"

  StreamlitSession5URL:
    Description: Streamlit Session 5 URL (Port 8085)
    Value: !Sub "https://${AlbName}.${Domain}:8085"


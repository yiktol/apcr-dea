            Values:
              - !Join ['', ['{{resolve:secretsmanager:', !Ref CloudFrontALBSecretName, ':SecretString:HEADER_VALUE}}']]
      ListenerArn: !Ref Listener8084
      Priority: 1

  ListenerRule8085:
    Type: 'AWS::ElasticLoadBalancingV2::ListenerRule'
    Properties:
      Actions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup8085
      Conditions:
        - Field: http-header
          HttpHeaderConfig:

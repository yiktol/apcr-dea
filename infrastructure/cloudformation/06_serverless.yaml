AWSTemplateFormatVersion: "2010-09-09"

Description: "DEA - Serverless API with DynamoDB, SQS, and EventBridge"

Parameters:
  LambdaCodeS3Bucket:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /genai/cognito/BucketName
    Description: "S3 bucket containing Lambda function code packages"
  
  ApiGatewayStage:
    Type: String
    Default: prod
    Description: "API Gateway deployment stage name"
  
  ApiCertificateArn:
    Type: String
    Default: ""
    Description: "ARN of ACM certificate for API domain"

  DomainName:
    Description: "Public Hosted Zone for domain configuration"
    Default: aws.yikyakyuk.com
    Type: String

  ApiDomainName:
    Type: String
    Default: coffee-api.aws.yikyakyuk.com
    Description: "API Gateway custom domain name"

  HostedZoneId:
    Type: String
    Default: Z09170582IZGKC67IAX17
    Description: "Route53 Hosted Zone ID for domain"

  ApiAuthSecretName:
    Type: String
    Default: "cloudfront/api-gw-handshake"
    Description: "Secrets Manager secret containing API authentication credentials"

  LogRetentionDays:
    Type: Number
    Default: 7
    Description: "Number of days to retain CloudWatch logs"

  SQSRetries:
    Type: Number
    Default: 5
    Description: "Maximum number of SQS message retries"

Resources:
  #############################################
  # CloudWatch Log Groups
  #############################################
  
  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}"
      RetentionInDays: !Ref LogRetentionDays

  ApiGatewayLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/apigateway/coffeeshopapi-${AWS::StackName}"
      RetentionInDays: !Ref LogRetentionDays

  #############################################
  # Messaging Resources - SQS Queues and SNS
  #############################################
  
  # Dead Letter Queue (no redrive policy)
  OrderProcessingDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: "OrderProcessingDLQ"
      VisibilityTimeout: 120
      MessageRetentionPeriod: 1209600  # 14 days
      Tags:
        - Key: Name
          Value: "Order Processing Dead Letter Queue"
        - Key: Purpose
          Value: "Handle failed order processing messages"
  
  # Main processing queue with DLQ
  OrderProcessingQueue: 
    Type: AWS::SQS::Queue
    Properties:
      QueueName: "OrderProcessingQueue"
      VisibilityTimeout: 120
      RedrivePolicy: 
        deadLetterTargetArn: !GetAtt OrderProcessingDLQ.Arn
        maxReceiveCount: !Ref SQSRetries
      Tags:
        - Key: Name
          Value: "Coffee Order Processing Queue"
        - Key: Purpose
          Value: "Process new coffee orders"
  
  OrderProcessingQueuePolicy: 
    Type: AWS::SQS::QueuePolicy
    Properties: 
      Queues: [!Ref OrderProcessingQueue]
      PolicyDocument: 
        Version: "2012-10-17"
        Statement: 
          - Action: ["SQS:SendMessage", "SQS:ReceiveMessage", "SQS:DeleteMessage"]
            Effect: Allow
            Resource: !GetAtt OrderProcessingQueue.Arn
            Principal:  
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
  
  # Order delivery queue
  OrderDeliveryQueue: 
    Type: AWS::SQS::Queue
    Properties:
      QueueName: "OrderDeliveryQueue"
      VisibilityTimeout: 120
      Tags:
        - Key: Name
          Value: "Order Delivery Queue"
        - Key: Purpose
          Value: "Handle order delivery notifications"

  # SNS Topic
  OrderNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: "BestCoffeeEver"
      Tags:
        - Key: Purpose
          Value: "Coffee orders notification distribution"

  OrderDeliveryQueuePolicy: 
    Type: AWS::SQS::QueuePolicy
    Properties: 
      Queues: [!Ref OrderDeliveryQueue]
      PolicyDocument: 
        Version: "2012-10-17"
        Statement: 
          - Action: ["SQS:SendMessage", "SQS:ReceiveMessage", "SQS:DeleteMessage"]
            Effect: Allow
            Resource: !GetAtt OrderDeliveryQueue.Arn
            Principal:  
              Service: sns.amazonaws.com
            Condition: 
              ArnEquals:
                aws:SourceArn: !Ref OrderNotificationTopic
          - Action: ["SQS:SendMessage", "SQS:ReceiveMessage", "SQS:DeleteMessage"]
            Effect: Allow
            Resource: !GetAtt OrderDeliveryQueue.Arn
            Principal:  
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"

  #############################################
  # Storage Resources - DynamoDB
  #############################################
  
  CoffeeOrdersTable: 
    Type: AWS::DynamoDB::GlobalTable
    Properties: 
      TableName: "CoffeeshopTable"
      AttributeDefinitions: 
        - AttributeName: "SalesId"
          AttributeType: "S"
        - AttributeName: "Timestamp"
          AttributeType: "S"
      KeySchema: 
        - AttributeName: "SalesId"
          KeyType: "HASH"
        - AttributeName: "Timestamp"
          KeyType: "RANGE"
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      Replicas:
        - Region: ap-southeast-1
          Tags:
            - Key: Application
              Value: CoffeeShop
            - Key: Purpose
              Value: "Store coffee orders and sales data"
        - Region: ap-southeast-2
          Tags:
            - Key: Application
              Value: CoffeeShop
            - Key: Purpose
              Value: "Store coffee orders and sales data"
        - Region: ap-south-1
          Tags:
            - Key: Application
              Value: CoffeeShop
            - Key: Purpose
              Value: "Store coffee orders and sales data"

  #############################################
  # IAM Roles
  #############################################
  
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: LambdaExecutionPolicy
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - "logs:CreateLogGroup"
                  - "logs:CreateLogStream"
                  - "logs:PutLogEvents"
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*"
              - Effect: Allow
                Action:
                  - "sqs:SendMessage"
                  - "sqs:ReceiveMessage"
                  - "sqs:DeleteMessage"
                  - "sqs:GetQueueAttributes"
                Resource: 
                  - !GetAtt OrderProcessingQueue.Arn
                  - !GetAtt OrderDeliveryQueue.Arn
                  - !GetAtt OrderProcessingDLQ.Arn
              - Effect: Allow
                Action:
                  - "sns:Publish"
                Resource: !Ref OrderNotificationTopic
              - Effect: Allow
                Action:
                  - "dynamodb:PutItem"
                  - "dynamodb:GetItem"
                  - "dynamodb:Query"
                  - "dynamodb:Scan"
                  - "dynamodb:UpdateItem"
                Resource: !GetAtt CoffeeOrdersTable.Arn
              - Effect: Allow
                Action:
                  - "secretsmanager:GetSecretValue"
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ApiAuthSecretName}*"
      Tags:
        - Key: Purpose
          Value: "Lambda function execution role with least privilege"

  #############################################
  # Lambda Functions
  #############################################
  
  BaristaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: "barista"
      Handler: barista.handler
      Runtime: python3.11
      Timeout: 60
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: wat/lambda/barista.zip
      Environment: 
        Variables: 
          QUEUE_URL: !Ref OrderProcessingQueue
          SNS_TOPIC: !Ref OrderNotificationTopic
      Tags:
        - Key: Service
          Value: CoffeeShop
        - Key: Application
          Value: "Serverless Coffee Shop"
        - Key: Function
          Value: "Coffee Preparation"

  BaristaEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt OrderProcessingQueue.Arn
      FunctionName: !Ref BaristaFunction
      BatchSize: 1
      MaximumBatchingWindowInSeconds: 5
      Enabled: true

  DDBWriterFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: "ddbwriter"
      Handler: dbwriter.handler
      Runtime: python3.11
      Timeout: 60
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: wat/lambda/dbwriter.zip
      Environment: 
        Variables: 
          TABLE_NAME: !Ref CoffeeOrdersTable
      Tags:
        - Key: Service
          Value: CoffeeShop
        - Key: Application
          Value: "Serverless Coffee Shop"
        - Key: Function
          Value: "Database Writer"

  WaiterFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: "waiter"
      Handler: waiter.handler
      Runtime: python3.11
      Timeout: 60
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment: 
        Variables: 
          QUEUE_URL: !Ref OrderDeliveryQueue
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: wat/lambda/waiter.zip
      Tags:
        - Key: Service
          Value: CoffeeShop
        - Key: Application
          Value: "Serverless Coffee Shop"
        - Key: Function
          Value: "Order Delivery"

  WaiterEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt OrderDeliveryQueue.Arn
      FunctionName: !Ref WaiterFunction
      BatchSize: 1
      MaximumBatchingWindowInSeconds: 5
      Enabled: true

  CashierFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: "cashier"
      Handler: cashier.handler
      Runtime: python3.11
      Timeout: 60
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: wat/lambda/cashier.zip
      Environment: 
        Variables: 
          QUEUE_URL: !Ref OrderProcessingQueue
      Tags:
        - Key: Service
          Value: CoffeeShop
        - Key: Application
          Value: "Serverless Coffee Shop"
        - Key: Function
          Value: "Order Entry"

  OrdersFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: "orders"
      Handler: orders.handler
      Runtime: python3.11
      Timeout: 60
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: wat/lambda/orders.zip
      Environment: 
        Variables: 
          TABLE_NAME: !Ref CoffeeOrdersTable
      Tags:
        - Key: Service
          Value: CoffeeShop
        - Key: Application
          Value: "Serverless Coffee Shop"
        - Key: Function
          Value: "Order Retrieval"

  SalesFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: "sales"
      Handler: sales.handler
      Runtime: python3.11
      Timeout: 60
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: wat/lambda/sales.zip
      Environment: 
        Variables: 
          TABLE_NAME: !Ref CoffeeOrdersTable
      Tags:
        - Key: Service
          Value: CoffeeShop
        - Key: Application
          Value: "Serverless Coffee Shop"
        - Key: Function
          Value: "Sales Reporting"

  StatusFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: "status"
      Handler: status.handler
      Runtime: python3.11
      Timeout: 60
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: wat/lambda/status.zip
      Environment: 
        Variables: 
          PROCESSING_QUEUE_URL: !Ref OrderProcessingQueue
          DELIVERY_QUEUE_URL: !Ref OrderDeliveryQueue
          DLQ_URL: !Ref OrderProcessingDLQ
          TABLE_NAME: !Ref CoffeeOrdersTable
      Tags:
        - Key: Service
          Value: CoffeeShop
        - Key: Application
          Value: "Serverless Coffee Shop"
        - Key: Function
          Value: "System Status"

  AuthorizerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: "authorizer"
      Handler: authorizer.handler
      Runtime: python3.12
      Timeout: 60
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: wat/lambda/authorizer.zip
      Environment:
        Variables:
          AUTH_HEADER_NAME: !Join ['', ['{{resolve:secretsmanager:', !Ref ApiAuthSecretName, ':SecretString:AUTH_HEADER_NAME}}']]
          AUTH_HEADER_VALUE: !Join ['', ['{{resolve:secretsmanager:', !Ref ApiAuthSecretName, ':SecretString:AUTH_HEADER_VALUE}}']]
          STAGE: !Ref ApiGatewayStage
      Tags:
        - Key: Service
          Value: CoffeeShop
        - Key: Application
          Value: "Serverless Coffee Shop"
        - Key: Function
          Value: "API Authorization"

  #############################################
  # API Gateway and Authentication
  #############################################

  # Add API Gateway CloudWatch Role
  ApiGatewayCloudWatchRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs

  # Configure API Gateway Account to use CloudWatch role
  ApiGatewayAccount:
    Type: AWS::ApiGateway::Account
    Properties:
      CloudWatchRoleArn: !GetAtt ApiGatewayCloudWatchRole.Arn

  CoffeeShopApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: "coffeeshopapi"
      Description: "API for Serverless Coffee Shop"
      EndpointConfiguration:
        Types:
          - REGIONAL
      Tags:
        - Key: Name
          Value: "Coffee Shop API"
        - Key: Purpose
          Value: "REST API for Coffee Shop operations"

  # API Gateway Authorizer
  ApiAuthorizer:
    Type: AWS::ApiGateway::Authorizer
    Properties:
      Name: LambdaAuthorizer
      RestApiId: !Ref CoffeeShopApi
      Type: REQUEST
      AuthorizerUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AuthorizerFunction.Arn}/invocations"
      IdentitySource: "method.request.header.x-origin-verify"
      AuthorizerCredentials: !GetAtt ApiGatewayExecutionRole.Arn

  # API Gateway Execution Role for Authorizer
  ApiGatewayExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LambdaInvokePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !GetAtt AuthorizerFunction.Arn

  # Status Resource
  StatusResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref CoffeeShopApi
      ParentId: !GetAtt CoffeeShopApi.RootResourceId
      PathPart: status

  StatusMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref CoffeeShopApi
      ResourceId: !Ref StatusResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${StatusFunction.Arn}/invocations"
        PassthroughBehavior: WHEN_NO_TEMPLATES
      MethodResponses:
        - StatusCode: 200
          ResponseModels:
            application/json: Empty

  # Sales Resource
  SalesResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref CoffeeShopApi
      ParentId: !GetAtt CoffeeShopApi.RootResourceId
      PathPart: sales

  SalesMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref CoffeeShopApi
      ResourceId: !Ref SalesResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${SalesFunction.Arn}/invocations"
        PassthroughBehavior: WHEN_NO_TEMPLATES
      MethodResponses:
        - StatusCode: 200
          ResponseModels:
            application/json: Empty

  # Orders Resource
  OrdersResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref CoffeeShopApi
      ParentId: !GetAtt CoffeeShopApi.RootResourceId
      PathPart: orders

  OrdersMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref CoffeeShopApi
      ResourceId: !Ref OrdersResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OrdersFunction.Arn}/invocations"
      MethodResponses:
        - StatusCode: 200
          ResponseModels:
            application/json: Empty

  # Cashier Resource
  CashierResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref CoffeeShopApi
      ParentId: !GetAtt CoffeeShopApi.RootResourceId
      PathPart: cashier

  CashierMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref CoffeeShopApi
      ResourceId: !Ref CashierResource
      HttpMethod: POST
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref ApiAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CashierFunction.Arn}/invocations"
        PassthroughBehavior: WHEN_NO_TEMPLATES
      MethodResponses:
        - StatusCode: 200
          ResponseModels:
            application/json: Empty

  # API Gateway Deployment
  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - StatusMethod
      - SalesMethod
      - OrdersMethod
      - CashierMethod
    Properties:
      RestApiId: !Ref CoffeeShopApi
      Description: "Coffee Shop API Deployment"
      StageName: !Ref ApiGatewayStage
      StageDescription:
        AccessLogSetting:
          DestinationArn: !GetAtt ApiGatewayLogGroup.Arn
          Format: '\$context.extendedRequestId \$context.identity.sourceIp \$context.identity.caller \$context.identity.user [\$context.requestTime] "\$context.httpMethod \$context.resourcePath \$context.protocol" \$context.status \$context.responseLength \$context.requestId'
        MethodSettings:
          - ResourcePath: "/*"
            HttpMethod: "*"
            LoggingLevel: INFO
            DataTraceEnabled: false
            MetricsEnabled: true
        Tags:
          - Key: Name
            Value: "Coffee Shop API Stage"

  # Custom Domain Name
  ApiDomainNameResource:
    Type: AWS::ApiGateway::DomainName
    Properties:
      DomainName: !Ref ApiDomainName
      RegionalCertificateArn: !Ref ApiCertificateArn
      EndpointConfiguration:
        Types:
          - REGIONAL
      SecurityPolicy: TLS_1_2
      Tags:
        - Key: Purpose
          Value: "Custom domain for Coffee Shop API"

  # Base Path Mapping
  ApiBasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    DependsOn: ApiDeployment
    Properties:
      DomainName: !Ref ApiDomainNameResource
      RestApiId: !Ref CoffeeShopApi
      Stage: !Ref ApiGatewayStage
      BasePath: !Ref ApiGatewayStage

  # Route53 Record for Custom Domain
  ApiRoute53Record:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref ApiDomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt ApiDomainNameResource.RegionalDomainName
        HostedZoneId: !GetAtt ApiDomainNameResource.RegionalHostedZoneId

  #############################################
  # SNS Topic Subscriptions
  #############################################
  
  DDBWriterSNSSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: lambda
      TopicArn: !Ref OrderNotificationTopic
      Endpoint: !GetAtt DDBWriterFunction.Arn

  OrderDeliverySNSSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: sqs
      TopicArn: !Ref OrderNotificationTopic
      Endpoint: !GetAtt OrderDeliveryQueue.Arn

  #############################################
  # Lambda Permissions
  #############################################
  
  CashierApiGatewayPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt CashierFunction.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${CoffeeShopApi}/*/POST/cashier"

  SalesApiGatewayPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt SalesFunction.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${CoffeeShopApi}/*/GET/sales"

  StatusApiGatewayPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt StatusFunction.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${CoffeeShopApi}/*/GET/status"

  OrdersApiGatewayPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt OrdersFunction.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${CoffeeShopApi}/*/GET/orders"

  AuthorizerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt AuthorizerFunction.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${CoffeeShopApi}/authorizers/*"

  DDBWriterSNSPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt DDBWriterFunction.Arn
      Action: lambda:InvokeFunction
      Principal: sns.amazonaws.com
      SourceArn: !Ref OrderNotificationTopic

  #############################################
  # Monitoring Dashboard
  #############################################
  
  CoffeeShopDashboard:
    Type: AWS::CloudWatch::Dashboard
    DependsOn:
      - CashierFunction
      - BaristaFunction
      - WaiterFunction
      - DDBWriterFunction
      - StatusFunction
      - SalesFunction
      - OrdersFunction
      - CoffeeShopApi
    Properties: 
      DashboardName: "Serverless"
      DashboardBody: !Sub |
        {
            "widgets": [
                {
                    "type": "metric",
                    "x": 0,
                    "y": 0,
                    "width": 6,
                    "height": 6,
                    "properties": {
                        "metrics": [
                            [ "AWS/Lambda", "Invocations", "FunctionName", "${CashierFunction}", { "region": "${AWS::Region}", "stat": "Sum" } ]
                        ],
                        "period": 300,
                        "region": "${AWS::Region}",
                        "title": "Cashier - Invocations",
                        "view": "singleValue",
                        "stacked": false,
                        "liveData": true,
                        "sparkline": true,
                        "singleValueFullPrecision": false
                    }
                },
                {
                    "type": "metric",
                    "x": 6,
                    "y": 0,
                    "width": 6,
                    "height": 6,
                    "properties": {
                        "metrics": [
                            [ "AWS/Lambda", "Invocations", "FunctionName", "${BaristaFunction}", { "region": "${AWS::Region}", "stat": "Sum" } ]
                        ],
                        "period": 300,
                        "region": "${AWS::Region}",
                        "title": "Barista - Invocations",
                        "view": "singleValue",
                        "stacked": false,
                        "liveData": true,
                        "sparkline": true,
                        "singleValueFullPrecision": false
                    }
                },
                {
                    "type": "metric",
                    "x": 12,
                    "y": 0,
                    "width": 6,
                    "height": 6,
                    "properties": {
                        "metrics": [
                            [ "AWS/Lambda", "Invocations", "FunctionName", "${WaiterFunction}", { "region": "${AWS::Region}", "stat": "Sum" } ]
                        ],
                        "period": 300,
                        "region": "${AWS::Region}",
                        "title": "Waiter - Invocations",
                        "view": "singleValue",
                        "stacked": false,
                        "singleValueFullPrecision": false,
                        "liveData": true,
                        "sparkline": true
                    }
                },
                {
                    "type": "metric",
                    "x": 18,
                    "y": 0,
                    "width": 6,
                    "height": 6,
                    "properties": {
                        "metrics": [
                            [ "AWS/Lambda", "Invocations", "FunctionName", "${DDBWriterFunction}", { "region": "${AWS::Region}", "stat": "Sum" } ]
                        ],
                        "period": 300,
                        "region": "${AWS::Region}",
                        "title": "DDBWriter - Invocations",
                        "view": "singleValue",
                        "stacked": true,
                        "liveData": true,
                        "sparkline": true,
                        "singleValueFullPrecision": false
                    }
                },
                {
                    "type": "metric",
                    "x": 0,
                    "y": 6,
                    "width": 6,
                    "height": 6,
                    "properties": {
                        "metrics": [
                            [ "AWS/Lambda", "Duration", "FunctionName", "${CashierFunction}", { "label": "Min", "stat": "Minimum", "region": "${AWS::Region}" } ],
                            [ "...", { "label": "Avg", "stat": "Average", "region": "${AWS::Region}" } ],
                            [ "...", { "label": "Max", "stat": "Maximum", "region": "${AWS::Region}" } ]
                        ],
                        "period": 300,
                        "region": "${AWS::Region}",
                        "view": "timeSeries",
                        "stacked": false,
                        "title": "Cashier - Duration (ms)",

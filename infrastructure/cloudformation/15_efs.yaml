AWSTemplateFormatVersion: '2010-09-09'
Description: 'Deploy EC2 instance with EFS file system in existing VPC'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: ID of the existing VPC
  
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: ID of the subnet where EC2 instance will be launched
  
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 KeyPair to enable SSH access
  
  InstanceName:
    Type: String
    Default: Ubuntu-EFS-Instance
    Description: Name tag for the EC2 instance

Resources:
  # Security Group for EC2 Instance
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EC2 instance with EFS access
      VpcId: !Ref VpcId
      Tags:
        - Key: Name
          Value: !Sub "${InstanceName}-SG"

  # Security Group for EFS
  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS mount targets
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref EC2SecurityGroup
          Description: NFS access from EC2
      Tags:
        - Key: Name
          Value: !Sub "${InstanceName}-EFS-SG"

  # EFS File System
  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      PerformanceMode: generalPurpose
      ThroughputMode: provisioned
      ProvisionedThroughputInMibps: 100
      Encrypted: true
      FileSystemTags:
        - Key: Name
          Value: !Sub "${InstanceName}-EFS"

  # EFS Mount Target
  EFSMountTarget:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref SubnetId
      SecurityGroups:
        - !Ref EFSSecurityGroup

  # IAM Role for EC2 Instance
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: EFSClientPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - elasticfilesystem:CreateAccessPoint
                  - elasticfilesystem:DescribeAccessPoints
                  - elasticfilesystem:DescribeFileSystems
                  - elasticfilesystem:DescribeMountTargets
                Resource: '*'

  # Instance Profile
  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role

  # EC2 Instance
  EC2Instance:
    Type: AWS::EC2::Instance
    DependsOn: EFSMountTarget
    Properties:
      ImageId: !Sub '{{resolve:ssm:/aws/service/canonical/ubuntu/server/24.04/stable/current/amd64/hvm/ebs-gp3/ami-id}}'
      InstanceType: t3.micro
      KeyName: !Ref KeyPairName
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          
          # Update system
          apt-get update -y
          
          # Install EFS utilities
          apt-get install -y amazon-efs-utils
          yum install -y nfs-utils
          
          apt-get -y install nfs-common
          file_system_id_1="${EFSFileSystem}"

          # Create mount point
          efs_mount_point_1=/mnt/efs
          mkdir -p "$efs_mount_point_1"
          
          test -f "/sbin/mount.efs" && printf "\n$file_system_id_1:/ $efs_mount_point_1 efs tls,_netdev\n" >> /etc/fstab || printf "\n$file_system_id_1.efs.ap-southeast-1.amazonaws.com:/ $efs_mount_point_1 nfs4 nfsvers=4.1,rsize=1048576,wsize=1048576,hard,timeo=600,retrans=2,noresvport,_netdev 0 0\n" >> /etc/fstab
          test -f "/sbin/mount.efs" && grep -ozP 'client-info]\nsource' '/etc/amazon/efs/efs-utils.conf'; if [[ $? == 1 ]]; then printf "\n[client-info]\nsource=liw\n" >> /etc/amazon/efs/efs-utils.conf; fi;
          

          retryCnt=15; waitTime=30; while true; do mount -a -t efs,nfs4 defaults; if [ $? = 0 ] || [ $retryCnt -lt 1 ]; then echo File system mounted successfully; break; fi; echo File system not available, retrying to mount.; ((retryCnt--)); sleep $waitTime; done;
          
          # Verify mount
          df -h "$efs_mount_point_1"
          
          # Create a test file
          echo "EFS mounted successfully on $(date)" > /mnt/efs/test.txt
          
          # Set permissions
          chmod 755 /mnt/efs
          chown ubuntu:ubuntu /mnt/efs
          
          # Install CloudWatch agent (optional)
          apt-get install -y awscli
          
          # Signal that the instance is ready
          /opt/aws/bin/cfn-signal -e $? --stack ${AWS::StackName} --resource EC2Instance --region ${AWS::Region}
      
      Tags:
        - Key: Name
          Value: !Ref InstanceName
    
    # CreationPolicy:
    #   ResourceSignal:
    #     Count: 1
    #     Timeout: PT10M

Outputs:
  InstanceId:
    Description: ID of the created EC2 instance
    Value: !Ref EC2Instance
  
  
  EFSFileSystemId:
    Description: ID of the EFS file system
    Value: !Ref EFSFileSystem
  
  EFSFileSystemDNS:
    Description: DNS name of the EFS file system
    Value: !Sub "${EFSFileSystem}.efs.${AWS::Region}.amazonaws.com"
  
  MountPoint:
    Description: EFS mount point on the EC2 instance
    Value: "/mnt/efs"



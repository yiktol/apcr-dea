
AWSTemplateFormatVersion: '2010-09-09'
Description: 'DEA - Load testing tool on ECS'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: ID of the existing VPC

  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: List of private subnet IDs for ECS tasks (comma-separated)

  ExistingECSCluster:
    Type: String
    Description: Name or ARN of the existing ECS cluster


  ExistingALBArn:
    Type: String
    Description: ARN of the existing Application Load Balancer

  ExistingALBSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security Group ID of the existing ALB

  ECRRepositoryURI:
    Type: String
    Description: URI of the existing ECR repository (e.g., 123456789012.dkr.ecr.ap-southeast-1.amazonaws.com/my-app:latest)
    Default: ""

  ContainerCpu:
    Type: Number
    Default: 512
    Description: CPU units for the container (256, 512, 1024, 2048, 4096)
    AllowedValues:
      - 256
      - 512
      - 1024
      - 2048
      - 4096

  ContainerMemory:
    Type: Number
    Default: 1024
    Description: Memory for the container in MB
    AllowedValues:
      - 512
      - 1024
      - 2048
      - 4096
      - 8192

  DesiredCount:
    Type: Number
    Default: 1
    Description: Desired number of ECS tasks
    MinValue: 1
    MaxValue: 10

  ApplicationName:
    Type: String
    Default: stress-tool
    Description: Name of the application for resource naming

  LogRetentionDays:
    Type: Number
    Default: 7
    Description: CloudWatch logs retention period in days
    AllowedValues: [1, 3, 5, 7, 14, 30, 60, 90, 120, 150, 180, 365, 400, 545, 731, 1827, 3653]

  HealthCheckPath:
    Type: String
    Default: /_stcore/health
    Description: Health check path for ALB target group

  ContainerPort:
    Type: Number
    Default: 8501
    Description: Port on which the container is listening

  CloudFrontALBHandshakeSecretName:
    Type: String
    Description: Name of the CloudFront ALB handshake secrets

  SSLCertificateArn:
    Type: String
    Description: ARN of the SSL certificate for the ALB

  ALBHTTPSListener:
    Type: String
    Description: ARN of the SSL certificate for the ALB

  UserPoolArn:
    Type: String
    Description: ARN of the User pool

  UserPoolClientId:
    Type: String
    Description: ID of Userpool client

  UserPoolDomain:
    Type: String
    Description: Domain of Userpool




# ====================
# Resources Section
# ====================
Resources:

  # ====================
  # IAM Roles
  # ====================
  
  # ECS Task Execution Role
  StressToolTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "ecsTaskExecutionRole-${ApplicationName}-${AWS::Region}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: ECRAndLogsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # ECR permissions for pulling container images
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                Resource: "*"
              
              # CloudWatch Logs permissions for container logs
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                Resource: 
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/ecs/${ApplicationName}*"

  # ECS Task Role
  StressToolTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "ecsTaskRole-${ApplicationName}-${AWS::Region}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SSMStressTestPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # SSM permissions for sending commands and monitoring
              - Effect: Allow
                Action:
                  - ssm:SendCommand
                  - ssm:ListCommands
                  - ssm:ListCommandInvocations
                  - ssm:DescribeInstanceInformation
                  - ssm:GetCommandInvocation
                Resource: "*"
              
              # EC2 permissions for tag-based targeting
              - Effect: Allow
                Action:
                  - ec2:DescribeInstances
                  - ec2:DescribeTags
                Resource: "*"
              
              # CloudWatch permissions for monitoring
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                  - cloudwatch:GetMetricStatistics
                  - cloudwatch:ListMetrics
                Resource: "*"
              
              # CloudWatch Logs permissions
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogStreams
                  - logs:DescribeLogGroups
                Resource: 
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/ecs/${ApplicationName}*"
      Tags:
        - Key: Application
          Value: !Ref ApplicationName

  # ====================
  # Security Groups
  # ====================
  
  # ECS Tasks Security Group
  ECSTaskSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "${ApplicationName}-ecs-task-sg"
      GroupDescription: Security group for ECS tasks
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref ContainerPort
          ToPort: !Ref ContainerPort
          SourceSecurityGroupId: !Ref ExistingALBSecurityGroupId
          Description: Allow traffic from existing ALB
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic
      Tags:
        - Key: Name
          Value: !Sub "${ApplicationName}-ecs-task-sg"
        - Key: Application
          Value: !Ref ApplicationName

  # ====================
  # Target Group for existing ALB
  # ====================
  
  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${ApplicationName}-tg"
      Port: !Ref ContainerPort
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: ip
      HealthCheckEnabled: true
      HealthCheckIntervalSeconds: 30
      HealthCheckPath: !Ref HealthCheckPath
      HealthCheckProtocol: HTTP
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: 200-299
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: '30'
        - Key: stickiness.enabled
          Value: 'false'
      Tags:
        - Key: Name
          Value: !Sub "${ApplicationName}-tg"
        - Key: Application
          Value: !Ref ApplicationName

  # ====================
  # ALB Listener (Created as Resource)
  # ====================


  ALBCustomHeaderListenerRule:
    Type: 'AWS::ElasticLoadBalancingV2::ListenerRule'
    Properties:
      Actions:
        - Type: authenticate-cognito
          AuthenticateCognitoConfig:
            UserPoolArn: !Ref UserPoolArn
            UserPoolClientId: !Ref UserPoolClientId
            UserPoolDomain: !Ref UserPoolDomain
            Scope: 'email openid profile'
            SessionCookieName: AWSALBAuthSessionCookie
            OnUnauthenticatedRequest: authenticate
          Order: 1
        - Type: forward
          TargetGroupArn: !Ref TargetGroup
          Order: 2
      Conditions:
        - Field: http-header
          HttpHeaderConfig:
            HttpHeaderName: !Join ['', ['{{resolve:secretsmanager:', !Ref CloudFrontALBHandshakeSecretName, ':SecretString:HEADER_NAME}}']]
            Values:
              - !Join ['', ['{{resolve:secretsmanager:', !Ref CloudFrontALBHandshakeSecretName, ':SecretString:HEADER_VALUE}}']]
        - Field: http-header
          HttpHeaderConfig:
            HttpHeaderName: 'x-cloudfront-path-pattern'
            Values:
              - '/stress-tool/'
        - Field: path-pattern
          Values:
            - '/*'
      ListenerArn: !Ref ALBHTTPSListener
      Priority: 1

  # ====================
  # CloudWatch Logs
  # ====================
  
  CloudWatchLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${ApplicationName}"
      RetentionInDays: !Ref LogRetentionDays

  # ====================
  # ECS Task Definition
  # ====================
  
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Ref ApplicationName
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: !Ref ContainerCpu
      Memory: !Ref ContainerMemory
      ExecutionRoleArn: !GetAtt StressToolTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt StressToolTaskRole.Arn
      ContainerDefinitions:
        - Name: !Sub "${ApplicationName}-container"
          Image: !Ref ECRRepositoryURI
          Essential: true
          PortMappings:
            - ContainerPort: !Ref ContainerPort
              Protocol: tcp
          Environment:
            - Name: AWS_DEFAULT_REGION
              Value: !Ref AWS::Region
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref CloudWatchLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
          HealthCheck:
            Command:
              - CMD-SHELL
              - !Sub "curl -f http://localhost:${ContainerPort}${HealthCheckPath} || exit 1"
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60
      Tags:
        - Key: Name
          Value: !Sub "${ApplicationName}-task"
        - Key: Application
          Value: !Ref ApplicationName

  # ====================
  # ECS Service using existing cluster
  # ====================
  
  ECSService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "${ApplicationName}-service"
      Cluster: !Ref ExistingECSCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets: !Ref PrivateSubnetIds
          SecurityGroups:
            - !Ref ECSTaskSecurityGroup
          AssignPublicIp: DISABLED
      LoadBalancers:
        - ContainerName: !Sub "${ApplicationName}-container"
          ContainerPort: !Ref ContainerPort
          TargetGroupArn: !Ref TargetGroup
      HealthCheckGracePeriodSeconds: 60
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 50
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      Tags:
        - Key: Name
          Value: !Sub "${ApplicationName}-service"
        - Key: Application
          Value: !Ref ApplicationName

# ====================
# Outputs Section
# ====================
Outputs:
  ECSServiceName:
    Description: Name of the ECS Service
    Value: !GetAtt ECSService.Name

  ECSServiceArn:
    Description: ARN of the ECS Service
    Value: !Ref ECSService

  TaskDefinitionArn:
    Description: ARN of the Task Definition
    Value: !Ref TaskDefinition

  TaskDefinitionFamily:
    Description: Family name of the Task Definition
    Value: !Ref ApplicationName

  StressToolTaskRoleArn:
    Description: ARN of the ECS Task Role for the Stress Tool
    Value: !GetAtt StressToolTaskRole.Arn

  StressToolTaskExecutionRoleArn:
    Description: ARN of the ECS Task Execution Role for the Stress Tool
    Value: !GetAtt StressToolTaskExecutionRole.Arn

  TargetGroupArn:
    Description: ARN of the Target Group
    Value: !Ref TargetGroup

  ECSTaskSecurityGroupId:
    Description: ID of the ECS Task Security Group
    Value: !Ref ECSTaskSecurityGroup

  CloudWatchLogGroupName:
    Description: Name of the CloudWatch Log Group
    Value: !Ref CloudWatchLogGroup

  CloudWatchLogGroupArn:
    Description: ARN of the CloudWatch Log Group
    Value: !GetAtt CloudWatchLogGroup.Arn

  UsedECSCluster:
    Description: ECS Cluster used for the deployment
    Value: !Ref ExistingECSCluster

  UsedALBArn:
    Description: ALB ARN used for the deployment
    Value: !Ref ExistingALBArn

  VpcId:
    Description: VPC ID used for the deployment
    Value: !Ref VpcId

  PrivateSubnetIds:
    Description: Private subnet IDs used for ECS tasks
    Value: !Join [",", !Ref PrivateSubnetIds]

  ContainerImageURI:
    Description: Container image URI used in the task definition
    Value: !Ref ECRRepositoryURI

  DesiredTaskCount:
    Description: Desired number of ECS tasks
    Value: !Ref DesiredCount

  ContainerCpuAllocation:
    Description: CPU allocation for containers
    Value: !Ref ContainerCpu

  ContainerMemoryAllocation:
    Description: Memory allocation for containers in MB
    Value: !Ref ContainerMemory
